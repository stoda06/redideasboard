<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED IDEAS — Business Innovation Board</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#0D0D0D;
  color:#E8E8E8;
  margin:0;
  padding:40px;
}

h1{
  font-family:'Bebas Neue';
  letter-spacing:2px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #2E2E2E;
}

input,select{
  background:#1A1A1A;
  color:white;
  border:1px solid #333;
  padding:8px;
}

button{
  padding:8px 14px;
  cursor:pointer;
}

.rank-HIGH{color:#22C55E}
.rank-MEDIUM{color:#F59E0B}
.rank-LOW{color:#6B7280}
</style>

</head>

<body>

<h1>RED IDEAS BOARD</h1>

<div>
<select id="f-person">
<option>Dan</option>
<option>Alex</option>
<option>Mike</option>
<option>Other</option>
</select>

<input id="f-idea" placeholder="Idea name">
<input id="f-desc" placeholder="Description">

<select id="f-rank">
<option value="">Unranked</option>
<option value="HIGH">HIGH</option>
<option value="MEDIUM">MEDIUM</option>
<option value="LOW">LOW</option>
</select>

<button onclick="addIdea()">Add</button>

</div>

<table>
<thead>
<tr>
<th>Person</th>
<th>Idea</th>
<th>Description</th>
<th>Rank</th>
<th>Notes</th>
<th></th>
</tr>
</thead>

<tbody id="ideasBody"></tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const { createClient } = supabase

const supabaseUrl = "https://lelymholbfpyqrusmxsl.supabase.co"
const supabaseKey = "sb_publishable_vcNodu6UCpE2jxo0YDlC6Q_9NKkOv8u"

const db = createClient(supabaseUrl, supabaseKey)

let ideas = []

function escHtml(str){
  if(!str) return ''
  return str.replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
}

async function loadIdeas(){

  const { data, error } = await db
    .from("ideas")
    .select("*")
    .order("created_at",{ascending:false})

  if(error) console.error(error)

  ideas = data || []

  render()
}

async function addIdea(){

  const person = document.getElementById('f-person').value
  const idea = document.getElementById('f-idea').value
  const desc = document.getElementById('f-desc').value
  const rank = document.getElementById('f-rank').value

  await db.from("ideas").insert([
    { person, idea, desc, rank, notes:"" }
  ])

  document.getElementById('f-idea').value=''
  document.getElementById('f-desc').value=''

}

async function deleteIdea(id){
  await db.from("ideas").delete().eq("id",id)
}

async function updateRank(id,val){
  await db.from("ideas").update({rank:val}).eq("id",id)
}

async function updateNotes(id,val){
  await db.from("ideas").update({notes:val}).eq("id",id)
}

function render(){

  const body = document.getElementById("ideasBody")

  body.innerHTML = ideas.map(i => `

<tr>

<td>${escHtml(i.person)}</td>

<td>${escHtml(i.idea)}</td>

<td>${escHtml(i.desc)}</td>

<td>

<select onchange="updateRank(${i.id},this.value)"
class="rank-${i.rank}">

<option value="">Unranked</option>
<option value="HIGH" ${i.rank==="HIGH"?"selected":""}>HIGH</option>
<option value="MEDIUM" ${i.rank==="MEDIUM"?"selected":""}>MEDIUM</option>
<option value="LOW" ${i.rank==="LOW"?"selected":""}>LOW</option>

</select>

</td>

<td>
<input value="${escHtml(i.notes||'')}"
oninput="updateNotes(${i.id},this.value)">
</td>

<td>
<button onclick="deleteIdea(${i.id})">X</button>
</td>

</tr>

`).join('')
}

loadIdeas()

/* REALTIME LISTENER */

db.channel('ideas-live')
.on(
  'postgres_changes',
  {event:'*',schema:'public',table:'ideas'},
  payload => {
    loadIdeas()
  }
)
.subscribe()

</script>

</body>
</html>
