<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Business Innovation Board</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
background:#0b0b0b;
font-family:Inter;
color:#e5e5e5;
margin:0;
}

.container{
max-width:1400px;
margin:auto;
padding:40px;
}

.title{
font-family:Bebas Neue;
font-size:64px;
letter-spacing:2px;
}

.title span{
color:#ff3b30;
}

.subtitle{
color:#9ca3af;
margin-top:5px;
margin-bottom:30px;
}

/* CARD */

.card{
background:#141414;
border-radius:6px;
padding:30px;
border-top:3px solid #ff3b30;
margin-bottom:30px;
}

/* FORM */

.form{
display:grid;
grid-template-columns:150px 250px 1fr 160px 140px;
gap:15px;
align-items:center;
}

input,select,textarea{
background:#0d0d0d;
border:1px solid #2a2a2a;
padding:10px;
border-radius:4px;
color:white;
}

textarea{
height:40px;
}

button{
background:#ff3b30;
border:none;
padding:10px 16px;
border-radius:4px;
font-weight:600;
cursor:pointer;
color:white;
}

button:hover{
background:#ff4d43;
}

/* FILTERS */

.filters{
display:flex;
gap:8px;
margin-bottom:20px;
}

.filter{
background:#1f1f1f;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
color:#ccc;
}

.filter.active{
background:#ff3b30;
color:white;
}

/* TABLE */

.table-card{
background:#141414;
border-radius:6px;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
color:#9ca3af;
font-size:13px;
}

td{
padding:12px;
border-top:1px solid #242424;
}

.rank-high{
color:#22c55e;
font-weight:600;
}

.rank-medium{
color:#f59e0b;
font-weight:600;
}

.rank-low{
color:#6b7280;
font-weight:600;
}

.notes{
width:200px;
}

.delete{
background:#333;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.empty{
text-align:center;
padding:60px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
BUSINESS <span>INNOVATION</span> BOARD
</div>

<div class="subtitle">
Submit, rank and evaluate new business ideas
</div>

<div class="card">

<div class="form">

<select id="person">
<option>Dan</option>
<option>Alex</option>
<option>Mike</option>
<option>Other</option>
</select>

<input id="idea" placeholder="Idea title">

<textarea id="description" placeholder="Supporting description"></textarea>

<select id="rank">
<option value="">Unranked</option>
<option>HIGH</option>
<option>MEDIUM</option>
<option>LOW</option>
</select>

<button onclick="addIdea()">+ ADD IDEA</button>

</div>

</div>

<div class="filters">
<button class="filter active">All</button>
<button class="filter">Dan</button>
<button class="filter">Alex</button>
<button class="filter">Mike</button>
<button class="filter">Other</button>
<button class="filter">High Priority</button>
</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Person</th>
<th>Idea</th>
<th>Description</th>
<th>Rank</th>
<th>Notes</th>
<th></th>
</tr>
</thead>

<tbody id="ideas"></tbody>

</table>

<div id="empty" class="empty">
💡 NO IDEAS YET
</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const { createClient } = supabase

const db = createClient(
"https://lelymholbfpyqrusmxsl.supabase.co",
"YOUR_PUBLIC_KEY"
)

let ideas=[]

async function loadIdeas(){

const {data}=await db
.from("ideas")
.select("*")
.order("id",{ascending:false})

ideas=data||[]

render()

}

async function addIdea(){

const person=document.getElementById("person").value
const idea=document.getElementById("idea").value
const description=document.getElementById("description").value
const rank=document.getElementById("rank").value

await db.from("ideas").insert({
person,
idea,
description,
rank,
notes:""
})

document.getElementById("idea").value=""
document.getElementById("description").value=""

loadIdeas()

}

async function deleteIdea(id){

await db.from("ideas").delete().eq("id",id)

}

async function updateRank(id,value){

await db.from("ideas").update({rank:value}).eq("id",id)

}

async function updateNotes(id,value){

await db.from("ideas").update({notes:value}).eq("id",id)

}

function render(){

const body=document.getElementById("ideas")
const empty=document.getElementById("empty")

if(ideas.length===0){
empty.style.display="block"
body.innerHTML=""
return
}

empty.style.display="none"

body.innerHTML=ideas.map(i=>`

<tr>

<td>${i.person}</td>
<td>${i.idea}</td>
<td>${i.description}</td>

<td>

<select onchange="updateRank(${i.id},this.value)">

<option ${i.rank===""?"selected":""}>Unranked</option>
<option ${i.rank==="HIGH"?"selected":""}>HIGH</option>
<option ${i.rank==="MEDIUM"?"selected":""}>MEDIUM</option>
<option ${i.rank==="LOW"?"selected":""}>LOW</option>

</select>

</td>

<td>
<input class="notes"
value="${i.notes||""}"
oninput="updateNotes(${i.id},this.value)">
</td>

<td>
<button class="delete" onclick="deleteIdea(${i.id})">X</button>
</td>

</tr>

`).join("")

}

loadIdeas()

</script>

</body>
</html>
