<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Innovation Board</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#0b0b0b;
color:#e5e5e5;
margin:0;
}

/* HEADER */

.header{
padding:40px 60px 20px 60px;
}

.title{
font-family:'Bebas Neue';
font-size:54px;
letter-spacing:2px;
}

.title span{
color:#ff3b30;
}

.subtitle{
color:#9ca3af;
margin-top:6px;
font-size:14px;
}

/* LAYOUT */

.container{
padding:0 60px 60px 60px;
}

/* CARD */

.card{
background:#151515;
border-radius:6px;
padding:25px;
margin-bottom:30px;
border-top:3px solid #ff3b30;
}

/* FORM */

.form-row{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

input, select{
background:#0f0f0f;
border:1px solid #2a2a2a;
color:white;
padding:10px;
border-radius:4px;
}

input{
width:220px;
}

textarea{
width:380px;
background:#0f0f0f;
border:1px solid #2a2a2a;
color:white;
padding:10px;
border-radius:4px;
}

button{
background:#ff3b30;
border:none;
color:white;
padding:10px 18px;
border-radius:4px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#ff4d43;
}

/* TABLE */

.table-card{
background:#151515;
border-radius:6px;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
color:#9ca3af;
font-size:13px;
}

td{
padding:12px;
border-top:1px solid #242424;
}

.rank-HIGH{color:#22c55e}
.rank-MEDIUM{color:#f59e0b}
.rank-LOW{color:#6b7280}

.notes{
width:220px;
}

.delete-btn{
background:#2a2a2a;
padding:6px 10px;
border-radius:4px;
}

</style>

</head>


<body>


<div class="header">

<div class="title">
BUSINESS <span>INNOVATION</span> BOARD
</div>

<div class="subtitle">
Submit, rank and evaluate new business ideas
</div>

</div>


<div class="container">


<div class="card">

<div class="form-row">

<select id="f-person">
<option>Dan</option>
<option>Alex</option>
<option>Mike</option>
<option>Other</option>
</select>

<input id="f-idea" placeholder="Idea title">

<textarea id="f-desc" placeholder="Supporting description"></textarea>

<select id="f-rank">
<option value="">Unranked</option>
<option value="HIGH">HIGH</option>
<option value="MEDIUM">MEDIUM</option>
<option value="LOW">LOW</option>
</select>

<button onclick="addIdea()">+ ADD IDEA</button>

</div>

</div>


<div class="table-card">

<table>

<thead>

<tr>
<th>Person</th>
<th>Idea</th>
<th>Description</th>
<th>Rank</th>
<th>Notes</th>
<th></th>
</tr>

</thead>

<tbody id="ideasBody"></tbody>

</table>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const { createClient } = supabase

const supabaseUrl = "https://lelymholbfpyqrusmxsl.supabase.co"
const supabaseKey = "sb_publishable_vcNodu6UCpE2jxo0YDlC6Q_9NKkOv8u"

const db = createClient(supabaseUrl, supabaseKey)

let ideas = []

function escHtml(str){
if(!str) return ''
return str.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
}


async function loadIdeas(){

const { data, error } = await db
.from("ideas")
.select("*")
.order("id",{ascending:false})

ideas = data || []

render()

}


async function addIdea(){

const person = document.getElementById('f-person').value
const idea = document.getElementById('f-idea').value
const description = document.getElementById('f-desc').value
const rank = document.getElementById('f-rank').value

await db.from("ideas").insert({
person,
idea,
description,
rank,
notes:""
})

document.getElementById('f-idea').value=''
document.getElementById('f-desc').value=''

loadIdeas()

}


async function deleteIdea(id){
await db.from("ideas").delete().eq("id",id)
}


async function updateRank(id,val){
await db.from("ideas").update({rank:val}).eq("id",id)
}


async function updateNotes(id,val){
await db.from("ideas").update({notes:val}).eq("id",id)
}



function render(){

const body = document.getElementById("ideasBody")

body.innerHTML = ideas.map(i => `

<tr>

<td>${escHtml(i.person)}</td>

<td>${escHtml(i.idea)}</td>

<td>${escHtml(i.description)}</td>

<td>

<select onchange="updateRank(${i.id},this.value)" class="rank-${i.rank}">

<option value="">Unranked</option>
<option value="HIGH" ${i.rank==="HIGH"?"selected":""}>HIGH</option>
<option value="MEDIUM" ${i.rank==="MEDIUM"?"selected":""}>MEDIUM</option>
<option value="LOW" ${i.rank==="LOW"?"selected":""}>LOW</option>

</select>

</td>

<td>

<input class="notes"
value="${escHtml(i.notes||'')}"
oninput="updateNotes(${i.id},this.value)">

</td>

<td>

<button class="delete-btn" onclick="deleteIdea(${i.id})">X</button>

</td>

</tr>

`).join('')

}


loadIdeas()


db.channel('ideas-live')
.on(
'postgres_changes',
{event:'*',schema:'public',table:'ideas'},
payload => {
loadIdeas()
}
)
.subscribe()

</script>


</body>

</html>
